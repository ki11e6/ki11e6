name: WakaTime Stats

on:
  # Runs at 12:00 AM IST (18:30 UTC)
  schedule:
    - cron: "30 18 * * *"
  # Allow manual trigger
  workflow_dispatch:

# Prevent concurrent runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-readme:
    name: Update Readme with Metrics
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: anmol098/waka-readme-stats@v5
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          # Keep only Code Time + weekly languages/editors; suppress noisy/off-message sections.
          # SHOW_PROJECTS is off to avoid leaking client project names (e.g. shopfloorgpt).
          SHOW_PROJECTS: "False"
          SHOW_OS: "False"
          SHOW_COMMIT: "False"
          SHOW_DAYS_OF_WEEK: "False"
          SHOW_LANGUAGE_PER_REPO: "False"
          SHOW_LINES_OF_CODE: "False"
          SHOW_LOC_CHART: "False"
          SHOW_SHORT_INFO: "False"
          SHOW_PROFILE_VIEWS: "False"
